name: Sync keymap-derived files

# Regenerate files derived from config/lily58.keymap whenever the bindings
# change:
#   1. ASCII layer-diagram comments inside the keymap itself
#   2. reference/keymap-reference.html (the printable cheat sheet)
#
# The nickcoutsos keymap-editor only edits the bindings block, so both of
# these need to be regenerated automatically to stay in sync.
#
# Loop safety: commits made with the default GITHUB_TOKEN do NOT trigger other
# workflow runs, so the auto-sync commit will not re-fire this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'config/lily58.keymap'
      - '.github/scripts/sync_layer_diagrams.py'
      - '.github/scripts/render_keymap_reference.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate ASCII layer diagrams
        run: python .github/scripts/sync_layer_diagrams.py config/lily58.keymap

      - name: Regenerate printable keymap reference
        run: python .github/scripts/render_keymap_reference.py config/lily58.keymap

      - name: Commit and push if changed
        run: |
          TARGETS="config/lily58.keymap reference/keymap-reference.html"
          if [[ -z "$(git status --porcelain $TARGETS)" ]]; then
            echo "Keymap-derived files already in sync."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $TARGETS
          git commit -m "chore: sync keymap-derived files with bindings"
          git push
